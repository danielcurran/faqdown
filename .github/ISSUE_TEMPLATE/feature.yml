name: Feature Request
description: Suggest an idea for faqmd
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's the pain point or missing capability?
      placeholder: "The converter doesn't handle X format of walkthrough"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example input
      description: Link to a GameFAQs walkthrough that demonstrates the need
      placeholder: "https://gamefaqs.gamespot.com/.../faqs/12345?print=1"
  - type: checkboxes
    id: willing
    attributes:
      label: Contribution
      options:
        - label: I'm willing to implement this
